<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RSS Reader</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="header-inner">
            <h1>
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 16 16" aria-hidden="true">
                    <path d="M14 1a1 1 0 0 1 1 1v12a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1zM2 0a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V2a2 2 0 0 0-2-2z"/>
                    <path d="M5.5 12a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0m-3-8.5a1 1 0 0 1 1-1c5.523 0 10 4.477 10 10a1 1 0 1 1-2 0 8 8 0 0 0-8-8 1 1 0 0 1-1-1m0 4a1 1 0 0 1 1-1 6 6 0 0 1 6 6 1 1 0 1 1-2 0 4 4 0 0 0-4-4 1 1 0 0 1-1-1"/>
                </svg>
                RSS Reader
            </h1>
            <nav>
                <button id="showArticlesBtn" class="active">Articles <span id="articleCount"></span></button>
                <button id="showSubsBtn">Feeds <span id="subCount"></span></button>
            </nav>
        </div>
    </header>

    <main>
        <div id="articlesView">
            <ul id="articleList"></ul>
        </div>

        <div id="subscriptionsView" class="hidden">
            <section class="subs-section">
                <h2>My Feeds</h2>
                <p id="noSubs" class="hidden">No feeds yet. Add one below or pick from the suggestions.</p>
                <ul id="subscriptionList"></ul>
            </section>

            <section class="subs-section">
                <h2>Add Feed</h2>
                <div class="add-feed-form">
                    <input type="url" id="rssUrl" placeholder="https://example.com/feed.xml" autocomplete="off" spellcheck="false">
                    <button id="addFeedBtn">Add</button>
                </div>
                <p id="addFeedError" class="error hidden"></p>
            </section>

            <section class="subs-section">
                <h2>Discover</h2>
                <ul id="recommendedList"></ul>
            </section>
        </div>
    </main>

    <script src="index.js"></script>
</body>

</html>
